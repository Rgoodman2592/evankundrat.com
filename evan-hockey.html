<head>

<title>Evan's Hockey Simulator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#001020;color:#fff;font-family:sans-serif;user-select:none}

#hud{
  position:fixed;top:0;left:0;right:0;height:72px;z-index:50;
  background:rgba(0,5,20,.97);border-bottom:3px solid #4fc3f7;
  display:flex;align-items:center;justify-content:space-between;padding:0 2rem;
  box-shadow:0 4px 30px rgba(79,195,247,.35);
}
#score-block{line-height:1}
#score-num{font-family:'Orbitron',monospace;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;color:#ffdd00;text-shadow:0 0 20px rgba(255,220,0,.9)}
#score-lbl{font-size:.6rem;letter-spacing:.2em;color:rgba(79,195,247,.55);text-transform:uppercase}
#title-block{text-align:center;font-family:'Bebas Neue';letter-spacing:.08em}
#title-main{font-size:clamp(1rem,2.2vw,1.8rem);color:#4fc3f7;text-shadow:0 0 12px rgba(79,195,247,.6)}
#title-sub{font-size:.55rem;color:rgba(255,255,255,.22);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
#hint-block{font-family:'Bebas Neue';font-size:clamp(.8rem,1.4vw,1.2rem);color:rgba(255,255,255,.45);text-align:right;letter-spacing:.06em}
#hint-key{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:4px;padding:1px 10px;font-size:.85em}

canvas{position:fixed;top:72px;left:0;width:100%;height:calc(100% - 72px);cursor:pointer;display:block}

/* CELEBRATION */
#cel{
  position:fixed;inset:0;z-index:200;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}
#cel.show{display:flex}
#goal-word{
  font-family:'Bebas Neue';font-size:clamp(5rem,20vw,14rem);
  color:#ffdd00;line-height:1;
  text-shadow:0 0 60px #ffdd00,0 0 120px rgba(255,180,0,.7);
  animation:gpop .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes gpop{from{transform:scale(.1) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
#goal-sub{font-family:'Orbitron',monospace;font-size:clamp(.7rem,2vw,1.6rem);color:#4fc3f7;letter-spacing:.15em;margin-top:.5rem;animation:fup .4s .2s both}
#cel-face{width:min(120px,18vw);aspect-ratio:1;border-radius:50%;object-fit:cover;object-position:center 15%;border:4px solid #ffdd00;box-shadow:0 0 50px rgba(255,220,0,.9);margin-top:1rem;animation:cspin .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cspin{from{transform:scale(0) rotate(-180deg)}to{transform:scale(1) rotate(0)}}
#goal-msg{font-size:clamp(.6rem,1.3vw,.95rem);color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;margin-top:.6rem;animation:fup .4s .4s both}
@keyframes fup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

.cf{position:fixed;border-radius:3px;animation:cfall linear forwards;pointer-events:none;z-index:300}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(800deg);opacity:0}}

#press{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue';font-size:clamp(1rem,2vw,1.5rem);letter-spacing:.14em;
  color:rgba(255,255,255,.22);animation:pp 1.5s ease-in-out infinite alternate;
  pointer-events:none;white-space:nowrap;z-index:40;
}
@keyframes pp{from{opacity:.1}to{opacity:.45}}

#mute{
  position:fixed;bottom:14px;right:14px;z-index:400;
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
#mute:hover{background:rgba(255,255,255,.22)}
</style>
</head>

let AC = null, muted = false;
function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
document.getElementById('mute').onclick = function() {
  muted = !muted;
  this.innerHTML = muted ? '&#128263;' : '&#128266;';
};

function playShoot() {
  if (muted) return;
  const a = ac();
  // Stick crack — shaped noise
  const len = a.sampleRate * 0.09;
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  const src = a.createBufferSource(); src.buffer = buf;
  const filt = a.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 900; filt.Q.value = 0.7;
  const g = a.createGain();
  src.connect(filt); filt.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(2.2, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.12);
  src.start();
  // Puck hiss
  const hlen = a.sampleRate * 0.22;
  const hbuf = a.createBuffer(1, hlen, a.sampleRate);
  const hd = hbuf.getChannelData(0);
  for (let i = 0; i < hlen; i++) hd[i] = (Math.random() * 2 - 1) * 0.3;
  const hsrc = a.createBufferSource(); hsrc.buffer = hbuf;
  const hf = a.createBiquadFilter(); hf.type = 'highpass'; hf.frequency.value = 3500;
  const hg = a.createGain();
  hsrc.connect(hf); hf.connect(hg); hg.connect(a.destination);
  hg.gain.setValueAtTime(0.45, a.currentTime + 0.04);
  hg.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.26);
  hsrc.start(a.currentTime + 0.04);
}

function playGoal() {
  if (muted) return;
  const a = ac();
  // Thud
  const to = a.createOscillator(), tg = a.createGain();
  to.connect(tg); tg.connect(a.destination);
  to.type = 'sine';
  to.frequency.setValueAtTime(130, a.currentTime);
  to.frequency.exponentialRampToValueAtTime(38, a.currentTime + 0.22);
  tg.gain.setValueAtTime(1.4, a.currentTime);
  tg.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.28);
  to.start(); to.stop(a.currentTime + 0.3);
  // Net rattle
  const rlen = a.sampleRate * 0.35;
  const rbuf = a.createBuffer(1, rlen, a.sampleRate);
  const rd = rbuf.getChannelData(0);
  for (let i = 0; i < rlen; i++) rd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rlen, 1.2) * 0.5;
  const rsrc = a.createBufferSource(); rsrc.buffer = rbuf;
  const rf = a.createBiquadFilter(); rf.type = 'bandpass'; rf.frequency.value = 1400; rf.Q.value = 1.2;
  const rg = a.createGain();
  rsrc.connect(rf); rf.connect(rg); rg.connect(a.destination);
  rg.gain.setValueAtTime(0.9, a.currentTime + 0.04);
  rg.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.42);
  rsrc.start(a.currentTime + 0.04);
  // Foghorn
  const ho = a.createOscillator(), hg = a.createGain(), hd2 = a.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = Math.tanh(x * 8); }
  hd2.curve = curve;
  ho.connect(hd2); hd2.connect(hg); hg.connect(a.destination);
  ho.type = 'sawtooth'; ho.frequency.value = 112;
  hg.gain.setValueAtTime(0.55, a.currentTime + 0.12);
  hg.gain.setValueAtTime(0.55, a.currentTime + 0.9);
  hg.gain.linearRampToValueAtTime(0, a.currentTime + 1.3);
  ho.start(a.currentTime + 0.12); ho.stop(a.currentTime + 1.35);
  // Crowd swell
  const clen = a.sampleRate * 3;
  const cbuf = a.createBuffer(1, clen, a.sampleRate);
  const cd = cbuf.getChannelData(0);
  for (let i = 0; i < clen; i++) cd[i] = Math.random() * 2 - 1;
  const csrc = a.createBufferSource(); csrc.buffer = cbuf;
  const cf1 = a.createBiquadFilter(); cf1.type = 'bandpass'; cf1.frequency.value = 700; cf1.Q.value = 0.4;
  const cf2 = a.createBiquadFilter(); cf2.type = 'lowpass'; cf2.frequency.value = 2000;
  const cg2 = a.createGain();
  csrc.connect(cf1); cf1.connect(cf2); cf2.connect(cg2); cg2.connect(a.destination);
  cg2.gain.setValueAtTime(0, a.currentTime + 0.1);
  cg2.gain.linearRampToValueAtTime(0.65, a.currentTime + 0.7);
  cg2.gain.setValueAtTime(0.65, a.currentTime + 2.2);
  cg2.gain.linearRampToValueAtTime(0, a.currentTime + 3.3);
  csrc.start(a.currentTime + 0.1);
  // Victory notes
  [523, 659, 784, 1047, 1319].forEach((freq, i) => {
    const o = a.createOscillator(), g2 = a.createGain();
    o.connect(g2); g2.connect(a.destination);
    o.type = 'triangle'; o.frequency.value = freq;
    const t = a.currentTime + 1.1 + i * 0.1;
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.28, t + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    o.start(t); o.stop(t + 0.42);
  });
}

function playPanic() {
  if (muted) return;
  const a = ac();
  const o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(900, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(220, a.currentTime + 0.28);
  g.gain.setValueAtTime(0.18, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.32);
  o.start(); o.stop(a.currentTime + 0.35);
}

class Spark {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - .5) * 5;
    this.vy = (Math.random() - .5) * 4 - 1;
    this.life = 1;
    this.r = Math.random() * 4 + 1;
    this.hue = 175 + Math.random() * 40;
  }
  step() { this.x += this.vx; this.y += this.vy; this.vy += .12; this.life -= .05; }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.fillStyle = 'hsl(' + this.hue + ',100%,72%)';
    ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

  'TEXTBOOK FINISH.', 'TOP SHELF. BAR DOWN.', 'THE GOALIE NEVER HAD A CHANCE.'];
const MSGS = ['Goalie: "I quit."', 'The net: "please stop."',
  'Goalie has requested a transfer.', '"I stepped aside out of RESPECT." - Goalie',
  'The puck: "It is an honor."', '"Is he even trying?" - Everyone',
  '"We have never seen anything like this." - Analysts'];

// ── Drawing ──
function drawRink() {
  const ig = ctx.createLinearGradient(0, 0, 0, H);
  ig.addColorStop(0, '#cceeff'); ig.addColorStop(.5, '#ddf4ff'); ig.addColorStop(1, '#bbddf0');
  ctx.fillStyle = ig; ctx.fillRect(0, 0, W, H);
  // Shine
  for (let i = 0; i < 7; i++) {
    ctx.save(); ctx.globalAlpha = .035; ctx.strokeStyle = '#fff'; ctx.lineWidth = 30;
    ctx.beginPath(); ctx.moveTo(i * W * .18 - 80, 0); ctx.lineTo(i * W * .18 - 40, H); ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  // Red center
  ctx.strokeStyle = '#e53935'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(W * .5, 0); ctx.lineTo(W * .5, H); ctx.stroke();
  ctx.beginPath(); ctx.arc(W * .5, H * .5, H * .12, 0, Math.PI * 2);
  ctx.stroke(); ctx.fillStyle = 'rgba(229,57,53,.07)'; ctx.fill();
  // Blue lines
  [W * .28, W * .72].forEach(bx => {
    ctx.strokeStyle = '#1565c0'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, H); ctx.stroke();
  });
  // Face-off dots
  [[W*.2,H*.25],[W*.2,H*.75],[W*.8,H*.25],[W*.8,H*.75]].forEach(([dx,dy]) => {
    ctx.fillStyle = '#e53935'; ctx.beginPath(); ctx.arc(dx, dy, 7, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
  drawNet(W * .05, H * .5, false);
  drawNet(W * .95, H * .5, true);
}

function drawNet(x, y, right) {
  const nw = W * .06, nh = H * .24, ny = y - nh / 2;
  const bx = right ? x - nw : x + nw;
  ctx.save();
  ctx.strokeStyle = '#e53935'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, ny); ctx.lineTo(x, ny + nh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, ny); ctx.lineTo(bx, ny); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, ny + nh); ctx.lineTo(bx, ny + nh); ctx.stroke();
  ctx.strokeStyle = 'rgba(120,120,180,.5)'; ctx.lineWidth = 1.5;
  for (let i = 0; i <= 5; i++) {
    const ly = ny + i * (nh / 5);
    ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(bx, ly); ctx.stroke();
  }
  for (let i = 0; i <= 4; i++) {
    const lx = right ? x - i * (nw / 4) : x + i * (nw / 4);
    ctx.beginPath(); ctx.moveTo(lx, ny); ctx.lineTo(lx, ny + nh); ctx.stroke();
  }
  // Crease
  ctx.fillStyle = 'rgba(21,101,192,.13)'; ctx.strokeStyle = '#1565c0'; ctx.lineWidth = 3;
  ctx.beginPath();
  if (right) { ctx.arc(x, y, H * .1, Math.PI * .5, Math.PI * 1.5); }
  else { ctx.arc(x, y, H * .1, -Math.PI * .5, Math.PI * .5); }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawPlayer(sa) {
  const x = W * .2, y = H * .5;
  const s = Math.min(W, H) * .0013;
  ctx.save(); ctx.translate(x, y);
  // Shadow
  ctx.save(); ctx.globalAlpha = .15; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 56*s, 36*s, 9*s, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
  // Skates
  [-16*s, 16*s].forEach(sx => {
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.roundRect(sx-8*s, 49*s, 16*s, 8*s, 3*s); ctx.fill();
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1.5*s;
    ctx.beginPath(); ctx.moveTo(sx-8*s, 55*s); ctx.lineTo(sx+8*s, 55*s); ctx.stroke();
  });
  // Legs
  ctx.fillStyle = '#0d2a6e';
  ctx.beginPath(); ctx.roundRect(-20*s, 20*s, 15*s, 31*s, 4*s); ctx.fill();
  ctx.beginPath(); ctx.roundRect(5*s, 20*s, 15*s, 31*s, 4*s); ctx.fill();
  // Jersey
  ctx.fillStyle = '#c62828';
  ctx.beginPath(); ctx.roundRect(-22*s, -20*s, 44*s, 42*s, 6*s); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(-22*s, 4*s, 44*s, 5*s); ctx.fillRect(-22*s, -2*s, 44*s, 4*s);
  ctx.font = 'bold ' + (14*s) + 'px Bebas Neue'; ctx.fillStyle = '#ffdd00'; ctx.textAlign = 'center';
  ctx.fillText('99', 0, 12*s);
  // Stick arm (shoot animation)
  ctx.save(); ctx.translate(22*s, 0); ctx.rotate(-Math.min(1,sa)*1.3);
  ctx.fillStyle = '#c62828'; ctx.beginPath(); ctx.roundRect(0,-5*s,10*s,30*s,4*s); ctx.fill();
  ctx.fillStyle = '#5a3200'; ctx.beginPath(); ctx.roundRect(4*s,22*s,5*s,62*s,2*s); ctx.fill();
  ctx.fillStyle = '#2a2a2a'; ctx.beginPath(); ctx.roundRect(4*s,82*s,26*s,6*s,2*s); ctx.fill();
  ctx.restore();
  // Left arm
  ctx.fillStyle = '#c62828'; ctx.beginPath(); ctx.roundRect(-30*s,-5*s,10*s,26*s,4*s); ctx.fill();
  // Head with face — COMICALLY HUGE
  const hs = 58*s;
  ctx.save(); ctx.translate(0, -82*s);
  // Big helmet shell
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(0, 0, hs, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c62828'; ctx.lineWidth = 4*s; ctx.stroke();
  // Face clipped into giant helmet
  ctx.save();
  ctx.beginPath(); ctx.arc(0, 4*s, hs*0.83, 0, Math.PI*2); ctx.clip();
  ctx.drawImage(faceImg, -hs*0.83, -hs*0.75, hs*1.66, hs*1.75);
  ctx.restore();
  // Chin guard bar
  ctx.fillStyle = 'rgba(26,26,46,0.75)';
  ctx.beginPath(); ctx.rect(-hs, hs*0.56, hs*2, hs*0.52); ctx.fill();
  ctx.restore();
  // Visor cage bars over the giant head
  ctx.save(); ctx.translate(0, -82*s);
  ctx.strokeStyle = 'rgba(160,230,255,.5)'; ctx.lineWidth = 2.5*s;
  [-12*s, -3*s, 7*s, 17*s].forEach(ly => {
    ctx.beginPath(); ctx.moveTo(-hs*0.78, ly); ctx.lineTo(hs*0.78, ly); ctx.stroke();
  });
  ctx.strokeStyle = 'rgba(160,230,255,.28)'; ctx.lineWidth = 2*s;
  [-hs*0.38, 0, hs*0.38].forEach(lx => {
    ctx.beginPath(); ctx.moveTo(lx, -10*s); ctx.lineTo(lx, 20*s); ctx.stroke();
  });
  // Red helmet trim glow
  ctx.strokeStyle = 'rgba(198,40,40,0.5)'; ctx.lineWidth = 6*s;
  ctx.beginPath(); ctx.arc(0, 0, hs+1*s, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function drawGoalie(gx, gy, panic) {
  const s = Math.min(W, H) * .0014;
  ctx.save(); ctx.translate(gx, gy);
  if (panic) ctx.rotate(Math.sin(Date.now() * .025) * .45);
  // Shadow
  ctx.save(); ctx.globalAlpha=.15; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,60*s,40*s,9*s,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  // Pads
  [-18*s,18*s].forEach(px => {
    ctx.fillStyle='#dde'; ctx.beginPath(); ctx.roundRect(px-10*s,10*s,20*s,55*s,6*s); ctx.fill();
    ctx.strokeStyle='#9090cc'; ctx.lineWidth=1.5*s; ctx.stroke();
  });
  // Skates
  [-18*s,18*s].forEach(sx => {
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(sx-10*s,63*s,20*s,8*s,3*s); ctx.fill();
  });
  // Body
  ctx.fillStyle='#3a3aaa'; ctx.beginPath(); ctx.roundRect(-24*s,-22*s,48*s,35*s,6*s); ctx.fill();
  // Mitts
  ctx.save(); ctx.translate(22*s,5*s); ctx.rotate(panic?-.7:0);
  ctx.fillStyle='#cc3300'; ctx.beginPath(); ctx.roundRect(0,-5*s,18*s,22*s,4*s); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(-22*s,5*s); ctx.rotate(panic?.7:0);
  ctx.fillStyle='#cc3300'; ctx.beginPath(); ctx.roundRect(-18*s,-5*s,18*s,22*s,4*s); ctx.fill(); ctx.restore();
  // Mask
  ctx.save(); ctx.translate(0,-38*s);
  ctx.fillStyle='#e8e8e8'; ctx.beginPath(); ctx.ellipse(0,0,25*s,28*s,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#cc3300'; ctx.lineWidth=2.5*s; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-25*s,0); ctx.lineTo(25*s,0); ctx.stroke();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.roundRect(-14*s,-9*s,11*s,7*s,2*s); ctx.fill();
  ctx.beginPath(); ctx.roundRect(3*s,-9*s,11*s,7*s,2*s); ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=1.5*s;
  [4*s,10*s,16*s].forEach(ly=>{ctx.beginPath();ctx.moveTo(-20*s,ly);ctx.lineTo(20*s,ly);ctx.stroke();});
  if (panic) {
    ctx.fillStyle='rgba(120,200,255,.85)';
    [[28*s,-16*s],[32*s,-4*s],[-30*s,-11*s]].forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(dx,dy,3*s,0,Math.PI*2);ctx.fill();});
  }
  ctx.restore();
  ctx.restore();
}

function drawPuck(px, py) {
  ctx.save();
  ctx.shadowBlur=12; ctx.shadowColor='rgba(0,0,0,.5)';
  ctx.fillStyle='#111'; ctx.strokeStyle='#444'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(px, py, 13, 8, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ── Shoot ──
function shoot() {
  if (shooting || celebrating) return;
  shooting = true; player.shooting = true; player.shootT = 0;
  playShoot();
  const sx = W * .23, sy = H * .5;
  const tx = W * .93, ty = H * .5;
  const dist = Math.hypot(tx-sx, ty-sy);
  puck = { x:sx, y:sy, vx:(tx-sx)/dist*24, vy:(ty-sy)/dist*24 };
  for (let i=0;i<18;i++) sparks.push(new Spark(sx,sy));
}

// ── Goal ──
function triggerGoal() {
  shooting = false; puck = null; player.shooting = false;
  score++;
  document.getElementById('score-num').textContent = score;
  celebrating = true; celebTimer = 0;
  playGoal();
  setTimeout(playPanic, 180);
  goalie.panic = true;
  setTimeout(() => goalie.panic = false, 3800);
  // Show celebration
  const cel = document.getElementById('cel');
  cel.innerHTML = cel.innerHTML; // re-trigger animations by resetting
  cel.classList.add('show');
  document.getElementById('goal-sub').textContent = SUBS[Math.floor(Math.random()*SUBS.length)];
  document.getElementById('goal-msg').textContent = MSGS[Math.floor(Math.random()*MSGS.length)];
  // Confetti
  const cols = ['#ffdd00','#4fc3f7','#ff3cac','#00e676','#fff','#ff6600'];
  for (let i=0;i<90;i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = 'left:'+Math.random()*100+'vw;top:-10px;width:'+(5+Math.random()*12)+'px;height:'+(5+Math.random()*12)+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';border-radius:'+(Math.random()<.5?'50%':'3px')+';animation-duration:'+(2+Math.random()*2)+'s;animation-delay:'+(Math.random()*.5)+'s;';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}

// ── Game loop ──
function loop() {
  requestAnimationFrame(loop);
  frame++;

  // Clear — use window dimensions directly
  ctx.clearRect(0, 0, W, H);

  // Update goalie
  if (!goalie.panic) {
    goalie.targetX = W * .87 + Math.sin(frame*.018)*W*.015;
    goalie.targetY = H * .5 + Math.sin(frame*.013)*H*.18;
  } else {
    goalie.targetX = W * .87 + Math.sin(frame*.14)*W*.1;
    goalie.targetY = H * .5 + Math.sin(frame*.12)*H*.28;
  }
  goalie.x += (goalie.targetX - goalie.x) * .06;
  goalie.y += (goalie.targetY - goalie.y) * .06;

  // Update shoot anim
  if (player.shooting) {
    player.shootT += .11;
    if (player.shootT >= 1) player.shooting = false;
  }

  // Update puck
  if (puck) {
    puck.x += puck.vx; puck.y += puck.vy;
    // Gentle curve toward center
    puck.vy += (H*.5 - puck.y) * .002;
    if (frame % 3 === 0) sparks.push(new Spark(puck.x, puck.y));
    if (puck.x >= W * .9) triggerGoal();
  }

  // Celebration countdown
  if (celebrating) {
    celebTimer++;
    if (celebTimer > 290) {
      celebrating = false;
      document.getElementById('cel').classList.remove('show');
    }
  }

  // Sparks
  sparks = sparks.filter(s => s.life > 0);

  // Draw
  drawRink();
  sparks.forEach(s => { s.step(); s.draw(); });
  if (puck) drawPuck(puck.x, puck.y);
  drawPlayer(player.shootT);
  drawGoalie(goalie.x, goalie.y, goalie.panic);

  // Goal flash
  if (celebrating && celebTimer < 12) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,220,0,' + (12-celebTimer)/12*.28 + ')';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

// ── Controls ──
window.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); shoot(); } });
canvas.addEventListener('click', shoot);
canvas.addEventListener('touchend', e => { e.preventDefault(); shoot(); }, {passive:false});
// Unlock audio on first tap
document.addEventListener('pointerdown', () => { if (!AC) ac(); }, {once:true});

// Start immediately — don't wait for image
loop();
// Also reload face when ready just in case
faceImg.onload = () => {};
</script>
