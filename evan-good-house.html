<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is This A Good House?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#0a0a12;
  font-family:'DM Sans', sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#fff;
}
#main { text-align:center; position:relative; z-index:10; width:100%; max-width:600px; padding:0 1rem; }
#question {
  font-family:'Bebas Neue'; font-size:clamp(1.8rem,4vw,3.5rem);
  letter-spacing:.08em; color:#fff; margin-bottom:1.5rem;
  text-shadow:0 0 20px rgba(255,255,255,.2);
}
#house-display {
  position:relative; margin:0 auto 1.5rem;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1); border-radius:12px;
  padding:1.5rem; min-height:180px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#house-emoji {
  font-size:clamp(4rem,12vw,8rem); line-height:1; display:block;
  margin-bottom:.4rem; transition:transform .3s;
}
#house-name {
  font-size:clamp(.75rem,1.4vw,1rem); color:rgba(255,255,255,.4);
  letter-spacing:.15em; text-transform:uppercase;
}
.btn-row { display:flex; gap:1.5rem; justify-content:center; margin-bottom:1.2rem; }
.btn {
  font-family:'Bebas Neue'; font-size:clamp(1.4rem,3vw,2.2rem);
  letter-spacing:.12em; padding:.55rem 2.8rem;
  border-radius:6px; border:none; cursor:pointer;
  transition:transform .1s, box-shadow .2s;
}
.btn:hover { transform:scale(1.07); }
.btn:active { transform:scale(.95); }
#btn-yes { background:linear-gradient(135deg,#00c853,#00a040); color:#fff; box-shadow:0 0 28px rgba(0,200,80,.4); }
#btn-no  { background:linear-gradient(135deg,#e53935,#b71c1c); color:#fff; box-shadow:0 0 28px rgba(229,57,53,.4); }
#evan-face {
  width:min(140px,32vw); aspect-ratio:1; border-radius:50%;
  object-fit:cover; object-position:center 15%;
  border:3px solid rgba(255,255,255,.15);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1), filter .3s, border-color .3s, box-shadow .3s;
  margin:0 auto .6rem; display:block;
}
#evan-label { font-size:.62rem; letter-spacing:.2em; color:rgba(255,255,255,.3); text-transform:uppercase; margin-bottom:1.2rem; }
body.happy #evan-face {
  transform:scale(1.18) rotate(3deg);
  filter:brightness(1.2) saturate(1.3);
  border-color:rgba(0,200,80,.8);
  box-shadow:0 0 40px rgba(0,200,80,.6);
}
body.angry { animation:shakeBody .07s infinite; }
body.angry #evan-face {
  transform:scale(1.35);
  filter:brightness(1.15) saturate(2) hue-rotate(-15deg) contrast(1.2);
  border-color:rgba(255,50,50,.9);
  box-shadow:0 0 70px rgba(255,0,0,.8);
}
@keyframes shakeBody {
  0%   { transform:translateX(0); }
  25%  { transform:translateX(-10px) rotate(-.6deg); }
  75%  { transform:translateX(10px) rotate(.6deg); }
  100% { transform:translateX(0); }
}
#wrong-overlay {
  position:fixed; inset:0; z-index:100; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none; overflow:hidden;
}
#wrong-overlay.show { display:flex; animation:redFlash .12s 4; }
@keyframes redFlash {
  0%,100% { background:rgba(160,0,0,0); }
  50%      { background:rgba(160,0,0,.4); }
}
#wrong-text {
  font-family:'Bebas Neue'; font-size:clamp(1.4rem,4.5vw,3.5rem);
  color:#ff4444; text-align:center; padding:2rem; line-height:1.2;
  text-shadow:0 0 30px rgba(255,0,0,.9);
  animation:wrongPop .3s cubic-bezier(.34,1.56,.64,1);
  max-width:750px;
}
@keyframes wrongPop { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
#wrong-sub {
  font-size:clamp(.7rem,1.4vw,1rem); color:rgba(255,150,150,.7);
  letter-spacing:.15em; text-transform:uppercase; margin-top:.8rem;
  text-align:center; padding:0 2rem;
}
#yes-overlay {
  position:fixed; inset:0; z-index:100; display:none;
  flex-direction:column; align-items:center; justify-content:center; pointer-events:none;
}
#yes-overlay.show { display:flex; }
#yes-text {
  font-family:'Bebas Neue'; font-size:clamp(3rem,10vw,8rem); color:#00e676;
  text-shadow:0 0 40px rgba(0,230,100,.9);
  animation:yesPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes yesPop { from { transform:scale(0.3) rotate(-12deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }
#yes-sub { font-size:clamp(.9rem,1.8vw,1.3rem); color:rgba(150,255,180,.7); letter-spacing:.15em; margin-top:.4rem; }
#score-bar {
  position:fixed; top:0; left:0; right:0; padding:.55rem 1.5rem;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(0,0,0,.45); backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.06); z-index:50;
  font-size:.68rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.35);
}
#correct-count { color:#00e676; font-weight:700; }
#wrong-count   { color:#ff5555; font-weight:700; }
.confetti {
  position:fixed; width:10px; height:10px; border-radius:2px;
  animation:confettiFall linear forwards; z-index:200; pointer-events:none;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform:translateY(105vh) rotate(740deg); opacity:0; }
}
/* mute button */
#mute-btn {
  position:fixed; bottom:16px; right:16px; z-index:500;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:50%; width:40px; height:40px; cursor:pointer;
  font-size:1.1rem; display:flex; align-items:center; justify-content:center;
  transition:background .2s;
}
#mute-btn:hover { background:rgba(255,255,255,.2); }
</style>
</head>

  <div id="evan-label">Evan Kundrat · Realtor · Expert</div>
  <div id="question">Is This A Good House?</div>
  <div id="house-display">
    <span id="house-emoji">🏠</span>
    <div id="house-name">A Normal House</div>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-yes" onclick="answer(true)">YES</button>
    <button class="btn" id="btn-no"  onclick="answer(false)">NO</button>
  </div>
</div>
<button id="mute-btn" onclick="toggleMute()" title="Mute/Unmute">🔊</button>

<script>
// ── AUDIO ENGINE ──
let audioCtx = null;
let muted = false;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

// Triumphant ding sequence (correct)
function playCorrect() {
  if (muted) return;
  const ac = getAudio();
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.1);
    gain.gain.setValueAtTime(0, ac.currentTime + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.35, ac.currentTime + i * 0.1 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.1 + 0.4);
    osc.start(ac.currentTime + i * 0.1);
    osc.stop(ac.currentTime + i * 0.1 + 0.5);
  });
  // Add a little chime shimmer
  const shimmer = ac.createOscillator();
  const shimGain = ac.createGain();
  shimmer.connect(shimGain); shimGain.connect(ac.destination);
  shimmer.type = 'triangle';
  shimmer.frequency.setValueAtTime(2093, ac.currentTime + 0.35);
  shimGain.gain.setValueAtTime(0.15, ac.currentTime + 0.35);
  shimGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.8);
  shimmer.start(ac.currentTime + 0.35);
  shimmer.stop(ac.currentTime + 0.8);
}

// Angry WRONG buzzer + alarm
function playWrong() {
  if (muted) return;
  const ac = getAudio();

  // Harsh buzzer
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const distortion = ac.createWaveShaper();
  // Create distortion curve
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = (Math.PI + 400) * x / (Math.PI + 400 * Math.abs(x)); }
  distortion.curve = curve;
  osc.connect(distortion); distortion.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, ac.currentTime);
  osc.frequency.setValueAtTime(100, ac.currentTime + 0.1);
  osc.frequency.setValueAtTime(120, ac.currentTime + 0.2);
  osc.frequency.setValueAtTime(100, ac.currentTime + 0.3);
  gain.gain.setValueAtTime(0.5, ac.currentTime);
  gain.gain.setValueAtTime(0.5, ac.currentTime + 0.4);
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.55);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.6);

  // Second hit
  const osc2 = ac.createOscillator();
  const gain2 = ac.createGain();
  const dist2 = ac.createWaveShaper();
  dist2.curve = curve;
  osc2.connect(dist2); dist2.connect(gain2); gain2.connect(ac.destination);
  osc2.type = 'sawtooth';
  osc2.frequency.setValueAtTime(110, ac.currentTime + 0.7);
  osc2.frequency.setValueAtTime(90, ac.currentTime + 0.85);
  gain2.gain.setValueAtTime(0.5, ac.currentTime + 0.7);
  gain2.gain.linearRampToValueAtTime(0, ac.currentTime + 1.2);
  osc2.start(ac.currentTime + 0.7);
  osc2.stop(ac.currentTime + 1.3);

  // High pitched alarm sweep
  const alarm = ac.createOscillator();
  const alarmGain = ac.createGain();
  alarm.connect(alarmGain); alarmGain.connect(ac.destination);
  alarm.type = 'square';
  alarm.frequency.setValueAtTime(880, ac.currentTime + 0.05);
  alarm.frequency.linearRampToValueAtTime(440, ac.currentTime + 0.25);
  alarm.frequency.setValueAtTime(880, ac.currentTime + 0.45);
  alarm.frequency.linearRampToValueAtTime(440, ac.currentTime + 0.65);
  alarmGain.gain.setValueAtTime(0.15, ac.currentTime + 0.05);
  alarmGain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.8);
  alarm.start(ac.currentTime + 0.05);
  alarm.stop(ac.currentTime + 0.85);
}

// ── GAME LOGIC ──
const HOUSES = [
  {emoji:'📦', name:'A Cardboard Box'},
  {emoji:'🏚️', name:'A Haunted Mansion'},
  {emoji:'🧱', name:'A Single Brick'},
  {emoji:'🏰', name:'A Medieval Castle'},
  {emoji:'🛖', name:'A Grass Hut'},
  {emoji:'🪣', name:'A Bucket (Upside Down)'},
  {emoji:'⛺', name:'A Tent From Walmart'},
  {emoji:'🚗', name:'A 2003 Honda Civic'},
  {emoji:'🍄', name:'A Mushroom'},
  {emoji:'🚽', name:'A Bathroom (Just The Toilet)'},
  {emoji:'🌵', name:'A Cactus'},
  {emoji:'🏢', name:'A 47-Story Office Building'},
  {emoji:'🛸', name:'A UFO (Probably Fine)'},
  {emoji:'🪺', name:'A Bird Nest (Some Assembly Required)'},
  {emoji:'🏠', name:'An Actually Normal House'},
  {emoji:'🎪', name:'A Circus Tent'},
  {emoji:'🚌', name:'A School Bus'},
  {emoji:'🧊', name:'An Ice Cube'},
  {emoji:'🥚', name:'A Large Egg'},
  {emoji:'🌊', name:'The Ocean (You Live In It Now)'},
];
const WRONG_LINES = [
  "INCORRECT. EVAN SAYS IT'S A GOOD HOUSE.",
  "WRONG. EVAN HAS SEEN WORSE. MUCH WORSE.",
  "NO. EVAN LIKES THIS PROPERTY.",
  "INCORRECT. GREAT BONES. EVAN'S WORDS.",
  "WRONG. EVAN WOULD LIST THIS AT $485K.",
  "NO. EVAN SEES POTENTIAL YOU CANNOT.",
  "EVAN DISAGREES. STRONGLY.",
  "THAT IS INCORRECT AND EVAN IS DISAPPOINTED.",
];

let houseIdx=0, correctCount=0, wrongCount=0, busy=false;
for(let i=HOUSES.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [HOUSES[i],HOUSES[j]]=[HOUSES[j],HOUSES[i]]; }

function showHouse() {
  const h=HOUSES[houseIdx%HOUSES.length];
  document.getElementById('house-emoji').textContent=h.emoji;
  document.getElementById('house-name').textContent=h.name;
  document.getElementById('house-emoji').style.transform='scale(1.25)';
  setTimeout(()=>document.getElementById('house-emoji').style.transform='',250);
}

function answer(yes) {
  if(busy) return;
  busy=true;
  if(yes) {
    correctCount++;
    document.getElementById('correct-count').textContent=correctCount;
    playCorrect();
    document.body.classList.add('happy');
    document.getElementById('yes-overlay').classList.add('show');
    spawnConfetti();
    setTimeout(()=>{
      document.getElementById('yes-overlay').classList.remove('show');
      document.body.classList.remove('happy');
      houseIdx++; showHouse(); busy=false;
    },1500);
  } else {
    wrongCount++;
    document.getElementById('wrong-count').textContent=wrongCount;
    playWrong();
    document.body.classList.add('angry');
    document.getElementById('wrong-text').textContent=WRONG_LINES[Math.floor(Math.random()*WRONG_LINES.length)];
    document.getElementById('wrong-overlay').classList.add('show');
    setTimeout(()=>{
      document.getElementById('wrong-overlay').classList.remove('show');
      document.body.classList.remove('angry');
      houseIdx++; showHouse(); busy=false;
    },2300);
  }
}

function spawnConfetti() {
  const cols=['#00e676','#ffdd00','#ff3cac','#00f0ff','#fff'];
  for(let i=0;i<45;i++){
    const el=document.createElement('div');
    el.className='confetti';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-duration:${1.4+Math.random()}s;animation-delay:${Math.random()*.3}s;border-radius:${Math.random()<.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  }
}

showHouse();
// Unlock audio on first interaction
document.addEventListener('click', ()=>{ if(!audioCtx) getAudio(); }, {once:true});
</script>
