  W = canvas.width  = window.innerWidth;

}

// ── Stars ──
const stars = Array.from({length: 280}, () => ({
  x: Math.random(), y: Math.random() * 0.75,
  r: Math.random() * 1.8 + 0.2,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.015 + 0.003,
}));

// ── Shooting stars ──
class ShootingStar {
  constructor() { this.reset(true); }
  reset(init=false) {
    this.x = Math.random() * W * 0.7;
    this.y = Math.random() * H * 0.3;
    this.len = Math.random() * 160 + 80;
    this.speed = Math.random() * 12 + 8;
    this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
    this.life = 1;
    this.decay = Math.random() * 0.018 + 0.012;
    this.width = Math.random() * 2 + 1;
    if(init) this.life = Math.random(); // stagger starts
  }
  update() {
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.life -= this.decay;
    if(this.life <= 0) this.reset();
  }
  draw() {
    const tx = this.x - Math.cos(this.angle) * this.len * this.life;
    const ty = this.y - Math.sin(this.angle) * this.len * this.life;
    const grad = ctx.createLinearGradient(tx, ty, this.x, this.y);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(1, `rgba(255,255,220,${this.life})`);
    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth = this.width;
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(255,255,200,0.8)';
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    // sparkle at head
    ctx.globalAlpha = this.life;
    ctx.fillStyle = '#fffde0';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.width * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}
const shootingStars = Array.from({length: 4}, () => new ShootingStar());
// stagger so they don't all appear at once
let nextShootingStar = 0;
const shootingStarQueue = Array.from({length: 4}, () => new ShootingStar());

// ── EVAN MOON ──
function drawMoon() {
  const mx = W * 0.72;
  const my = H * 0.22;
  const r  = Math.min(W, H) * 0.21; // HUGE

  // Outer glow
  const glow = ctx.createRadialGradient(mx, my, r * 0.5, mx, my, r * 2.2);
  glow.addColorStop(0, 'rgba(255,235,150,0.22)');
  glow.addColorStop(0.5, 'rgba(255,220,80,0.08)');
  glow.addColorStop(1, 'rgba(255,220,80,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(mx, my, r * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Moon circle — clip Evan's face into it
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, r, 0, Math.PI * 2);
  ctx.clip();

  if (faceImg.complete && faceImg.naturalWidth > 0) {
    // Draw face centered, slightly offset upward to show more face
    const size = r * 2.15;
    ctx.drawImage(faceImg, mx - size/2, my - size * 0.55, size, size);
    // Warm tint overlay to make it look moon-like
    ctx.fillStyle = 'rgba(255, 220, 80, 0.18)';
    ctx.fillRect(mx - r, my - r, r*2, r*2);
  } else {
    // Fallback gold moon
    const mg = ctx.createRadialGradient(mx - r*0.2, my - r*0.2, r*0.1, mx, my, r);
    mg.addColorStop(0, '#fffde0');
    mg.addColorStop(0.7, '#f0d060');
    mg.addColorStop(1, '#c8a820');
    ctx.fillStyle = mg;
    ctx.fill();
  }
  ctx.restore();

  // Moon border ring — golden glow
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 210, 60, 0.7)';
  ctx.lineWidth = 4;
  ctx.shadowBlur = 30;
  ctx.shadowColor = 'rgba(255, 200, 50, 0.9)';
  ctx.stroke();
  ctx.restore();
}

// ── GROUND ──
function drawGround() {
  // Night sky gradient at horizon
  const skyGrad = ctx.createLinearGradient(0, H*0.62, 0, H*0.72);
  skyGrad.addColorStop(0, 'rgba(0,8,30,0)');
  skyGrad.addColorStop(1, 'rgba(0,8,30,1)');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, H*0.62, W, H*0.1);

  // Ground — dark green
  const gGrad = ctx.createLinearGradient(0, H*0.72, 0, H);
  gGrad.addColorStop(0, '#0a1f08');
  gGrad.addColorStop(0.3, '#0d2a0a');
  gGrad.addColorStop(1, '#061204');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, H*0.72, W, H*0.28);

  // Horizon glow
  const hGrad = ctx.createLinearGradient(0, H*0.7, 0, H*0.76);
  hGrad.addColorStop(0, 'rgba(20,60,15,0.6)');
  hGrad.addColorStop(1, 'rgba(20,60,15,0)');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, H*0.7, W, H*0.06);
}

// ── GRASS ──
const grassBlades = Array.from({length: 180}, () => ({
  x: Math.random(),
  h: Math.random() * 0.045 + 0.02,
  w: Math.random() * 3 + 1.5,
  sway: Math.random() * Math.PI * 2,
  swaySpeed: Math.random() * 0.02 + 0.008,
  col: `hsl(${100 + Math.random()*30}, ${45+Math.random()*25}%, ${18+Math.random()*12}%)`,
}));

function drawGrass(t) {
  for (const b of grassBlades) {
    b.sway += b.swaySpeed;
    const bx = b.x * W;
    const by = H * 0.73;
    const topX = bx + Math.sin(b.sway) * 4;
    const topY = by - b.h * H;
    ctx.save();
    ctx.strokeStyle = b.col;
    ctx.lineWidth = b.w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx + Math.sin(b.sway)*8, by - b.h*H*0.5, topX, topY);
    ctx.stroke();
    ctx.restore();
  }
}

// ── COW STATE ──
const cow = {
  x: 0.5,       // normalized x position
  lookingAt: false,
  lookTimer: 0,
  lookInterval: 0,
  mooTimer: 0,
  mooText: '',
  chewT: 0,
  tailT: 0,
  earT: 0,
  legT: 0,
  nextLook: 280 + Math.floor(Math.random() * 320),
  eyeOpen: true,
  blinkTimer: 0,
  nextBlink: 60 + Math.floor(Math.random()*80),
};

const MOOS = ['MOO!','...moo.','MOO!!','moooo~','*MOO*','moo?','M O O','MOO! 🌕'];

// ── DRAW COW ──
function drawCow(t) {
  const cx = cow.x * W;
  const cy = H * 0.73; // sits on ground line
  const s  = Math.min(W, H) * 0.0012; // scale factor

  ctx.save();
  ctx.translate(cx, cy);

  // ── TAIL ──
  cow.tailT += 0.04;
  const tailSwing = Math.sin(cow.tailT) * 18;
  ctx.save();
  ctx.translate(70*s, -55*s);
  ctx.strokeStyle = '#4a3020';
  ctx.lineWidth = 3*s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(30*s + tailSwing*s, -20*s, 40*s + tailSwing*1.5*s, 20*s);
  ctx.stroke();
  // Tail tuft
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath();
  ctx.ellipse(40*s + tailSwing*1.5*s, 22*s, 8*s, 5*s, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── LEGS ──
  cow.legT += 0.03;
  const legPairs = [[-45*s, 0], [-15*s, 0.3], [20*s, 0.15], [50*s, 0.45]];
  for (const [lx, phase] of legPairs) {
    const legBob = Math.sin(cow.legT + phase) * 2*s;
    ctx.save();
    ctx.translate(lx, 0);
    // Upper leg
    ctx.fillStyle = '#f0ede5';
    ctx.beginPath();
    ctx.roundRect(-7*s, -30*s, 14*s, 35*s + legBob, 4*s);
    ctx.fill();
    // Lower leg (dark)
    ctx.fillStyle = '#1a1208';
    ctx.beginPath();
    ctx.roundRect(-6*s, 2*s + legBob, 12*s, 22*s, 3*s);
    ctx.fill();
    // Hoof
    ctx.fillStyle = '#0d0a05';
    ctx.beginPath();
    ctx.ellipse(0, 24*s + legBob, 8*s, 4*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ── BODY ──
  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath();
  ctx.ellipse(0, -55*s, 85*s, 45*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#d4cfc5';
  ctx.lineWidth = 1.5*s;
  ctx.stroke();

  // Black patches on body
  const patches = [
    {x: -30*s, y: -65*s, rx: 28*s, ry: 18*s, angle: -0.2},
    {x:  40*s, y: -45*s, rx: 22*s, ry: 15*s, angle: 0.3},
    {x: -10*s, y: -35*s, rx: 15*s, ry: 10*s, angle: -0.1},
  ];
  for (const p of patches) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = '#1a1208';
    ctx.beginPath();
    ctx.ellipse(0, 0, p.rx, p.ry, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ── UDDER ──
  ctx.fillStyle = '#f0b0b0';
  ctx.beginPath();
  ctx.ellipse(-5*s, -14*s, 22*s, 14*s, 0, 0, Math.PI*2);
  ctx.fill();
  for (const tx of [-18*s, -6*s, 6*s, 18*s]) {
    ctx.fillStyle = '#d09090';
    ctx.beginPath();
    ctx.ellipse(tx, -4*s, 4*s, 8*s, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ── NECK ──
  ctx.fillStyle = '#f0ede5';
  ctx.beginPath();
  ctx.moveTo(-65*s, -70*s);
  ctx.lineTo(-85*s, -110*s);
  ctx.lineTo(-65*s, -115*s);
  ctx.lineTo(-50*s, -72*s);
  ctx.closePath();
  ctx.fill();

  // ── HEAD ──
  const headTilt = cow.lookingAt ? -0.25 : Math.sin(t * 0.008) * 0.04;
  ctx.save();
  ctx.translate(-80*s, -115*s);
  ctx.rotate(headTilt);

  // Head shape
  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath();
  ctx.ellipse(0, 0, 32*s, 28*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#d4cfc5';
  ctx.lineWidth = 1.5*s;
  ctx.stroke();

  // Black patch on head
  ctx.fillStyle = '#1a1208';
  ctx.beginPath();
  ctx.ellipse(-5*s, -8*s, 18*s, 12*s, 0.2, 0, Math.PI*2);
  ctx.fill();

  // ── SNOUT ──
  ctx.fillStyle = '#e8c4b0';
  ctx.beginPath();
  ctx.ellipse(0, 16*s, 20*s, 14*s, 0, 0, Math.PI*2);
  ctx.fill();
  // Nostrils
  ctx.fillStyle = '#c09080';
  ctx.beginPath();
  ctx.ellipse(-7*s, 17*s, 5*s, 4*s, -0.3, 0, Math.PI*2);
  ctx.ellipse(7*s, 17*s, 5*s, 4*s, 0.3, 0, Math.PI*2);
  ctx.fill();

  // ── MOUTH / CHEWING ──
  cow.chewT += cow.lookingAt ? 0 : 0.08;
  const chewOpen = Math.max(0, Math.sin(cow.chewT) * 5*s);
  ctx.strokeStyle = '#a07060';
  ctx.lineWidth = 2*s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 22*s, 8*s, 0.1, Math.PI - 0.1);
  ctx.stroke();
  if (chewOpen > 1) {
    ctx.fillStyle = '#8a4030';
    ctx.beginPath();
    ctx.ellipse(0, 24*s + chewOpen*0.5, 6*s, chewOpen, 0, 0, Math.PI*2);
    ctx.fill();
  }
  // Grass in mouth
  if (!cow.lookingAt) {
    ctx.strokeStyle = `hsl(${110+Math.sin(cow.chewT)*10}, 55%, 25%)`;
    ctx.lineWidth = 2.5*s;
    for (let i=-1; i<=1; i++) {
      ctx.beginPath();
      ctx.moveTo(i*5*s, 28*s);
      ctx.lineTo(i*5*s + Math.sin(cow.chewT+i)*6*s, 38*s);
      ctx.stroke();
    }
  }

  // ── EYES ──
  cow.blinkTimer++;
  if (cow.blinkTimer > cow.nextBlink) {
    cow.eyeOpen = !cow.eyeOpen;
    cow.blinkTimer = 0;
    cow.nextBlink = cow.eyeOpen ? 55 + Math.floor(Math.random()*70) : 4;
  }

  const eyePositions = cow.lookingAt
    ? [[-8*s, -8*s]] // one eye facing viewer
    : [[-14*s, -8*s], [8*s, -8*s]];

  for (const [ex, ey] of eyePositions) {
    // White
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(ex, ey, 9*s, cow.eyeOpen ? 8*s : 1.5*s, 0, 0, Math.PI*2);
    ctx.fill();
    if (cow.eyeOpen) {
      // Iris
      ctx.fillStyle = cow.lookingAt ? '#3a6fd8' : '#5a3010';
      ctx.beginPath();
      ctx.ellipse(ex + (cow.lookingAt ? 1*s : 0), ey, 6*s, 6*s, 0, 0, Math.PI*2);
      ctx.fill();
      // Pupil
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(ex + (cow.lookingAt ? 1.5*s : 0), ey, 3.5*s, 4*s, 0, 0, Math.PI*2);
      ctx.fill();
      // Catchlight
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(ex + 2*s, ey - 2*s, 2*s, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── EARS ──
  cow.earT += 0.04;
  for (const [side, ex2] of [[-1, -30*s], [1, 28*s]]) {
    const earWag = Math.sin(cow.earT + (side===1?1:0)) * 0.12;
    ctx.save();
    ctx.translate(ex2, -14*s);
    ctx.rotate(side * (0.4 + earWag));
    ctx.fillStyle = '#f0ede5';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10*s, 16*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#e0b0a0';
    ctx.beginPath();
    ctx.ellipse(0, 2*s, 5*s, 10*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ── HORNS ──
  ctx.strokeStyle = '#d4b060';
  ctx.lineWidth = 4*s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-22*s, -22*s);
  ctx.quadraticCurveTo(-38*s, -45*s, -28*s, -50*s);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(18*s, -22*s);
  ctx.quadraticCurveTo(34*s, -45*s, 24*s, -50*s);
  ctx.stroke();

  ctx.restore(); // end head

  // ── MOO TEXT ──
  if (cow.mooTimer > 0 && cow.mooText) {
    const alpha = Math.min(1, cow.mooTimer / 50);
    const floatUp = (100 - cow.mooTimer) * 0.5;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.max(20, 42*s)}px 'Georgia', serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fffde0';
    ctx.shadowBlur = 20;
    ctx.shadowColor = 'rgba(255,230,80,0.9)';
    ctx.fillText(cow.mooText, -10*s, -160*s - floatUp);
    ctx.restore();
    cow.mooTimer--;
  }

  ctx.restore(); // end cow translate
}

// ── UPDATE COW ──
let frame = 0;
function updateCow() {
  cow.lookInterval++;

  if (!cow.lookingAt) {
    if (cow.lookInterval >= cow.nextLook) {
      cow.lookingAt = true;
      cow.lookTimer = 120 + Math.floor(Math.random() * 80);
      cow.mooText = MOOS[Math.floor(Math.random() * MOOS.length)];
      cow.mooTimer = 110;
      cow.lookInterval = 0;
      cow.nextLook = 260 + Math.floor(Math.random() * 400);
    }
  } else {
    cow.lookTimer--;
    if (cow.lookTimer <= 0) {
      cow.lookingAt = false;
    }
  }
}

// ── MAIN LOOP ──
function loop() {
  requestAnimationFrame(loop);
  frame++;

  // Clear
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.73);
  skyGrad.addColorStop(0, '#000005');
  skyGrad.addColorStop(0.5, '#000818');
  skyGrad.addColorStop(1, '#001025');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H * 0.73);

  // Stars
  for (const s of stars) {
    s.twinkle += s.speed;
    const alpha = Math.max(0, 0.2 + Math.sin(s.twinkle) * 0.6);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Shooting stars
  for (const ss of shootingStars) {
    ss.update();
    if (ss.life > 0) ss.draw();
  }

  // Evans moon face
  drawMoon();

  // Ground
  drawGround();

  // Grass
  drawGrass(frame);

  // Cow
  updateCow();
  drawCow(frame);
}

faceImg.onload = loop;
faceImg.onerror = loop;
</script>
</body>
